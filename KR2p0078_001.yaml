body:
  text: 相乎官灌樹桐且怡始兮斷外疏中眾木之紀兮孰冬之祁寒葉其方落兮鳳鳥之所集埃時而作兮木斯獨生榛棘之間兮亟植速兼成厚其不還兮深利開衍豆屬亢其不貳兮亂本曾枝浸毀兮嗟嗟君子觀乎樹之容兮豈不偕生則不同兮謂群眾鳥敬而勿集兮素府素柑白花宮絳工理素府宮李即普通人家園子裡的李樹與作為官樹的桐樹作對比木異類兮願歲之啟時思乎樹秀兮豐華重光民之所好兮守物強幹木一心兮違與它木非與從風兮
